<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Viewer</title>
  <style>
:root {
  --bg: #f5f5f7;
  --fg: #1d1d1f;
  --fg-secondary: rgba(0, 0, 0, 0.8);
  --fg-muted: rgba(0, 0, 0, 0.48);
  --accent: #0071e3;
  --accent-link: #0066cc;
  --border: rgba(0, 0, 0, 0.1);
  --surface: #ffffff;
  --surface-code: #f0f0f2;
  --nav-bg: rgba(255, 255, 255, 0.72);
  --shadow: rgba(0, 0, 0, 0.22) 0px 3px 30px 0px;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 17px;
  line-height: 1.47;
  letter-spacing: -0.022em;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --fg: #f5f5f7;
    --fg-secondary: rgba(255, 255, 255, 0.8);
    --fg-muted: rgba(255, 255, 255, 0.48);
    --accent: #2997ff;
    --accent-link: #2997ff;
    --border: rgba(255, 255, 255, 0.12);
    --surface: #1d1d1f;
    --surface-code: #161617;
    --nav-bg: rgba(29, 29, 31, 0.72);
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--fg); }

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}
#app.drag-active::after {
  content: "Drop markdown file here";
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg);
  background: color-mix(in srgb, var(--bg) 85%, var(--accent));
  border: 2px dashed var(--accent);
  border-radius: 12px;
  margin: 8px;
  pointer-events: none;
}

/* Header — translucent glass nav */
header {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  padding: 0 1rem;
  height: 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 1rem;
}
header h1 {
  margin: 0;
  font-size: 0.875rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap;
}
header .hint {
  font-size: 0.75rem;
  color: var(--fg-muted);
  flex: 1 1 8rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.375rem 0.75rem;
}
.controls label {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.75rem;
  color: var(--fg-secondary);
  cursor: pointer;
  white-space: nowrap;
}
.controls select {
  font: inherit;
  font-size: 0.75rem;
  padding: 2px 4px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  cursor: pointer;
}

/* Buttons — Apple pill style */
.btn {
  font: inherit;
  font-size: 0.75rem;
  font-weight: 400;
  padding: 4px 12px;
  border-radius: 980px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
  line-height: 1.33;
}
.btn:hover {
  background: var(--accent);
  color: #ffffff;
}
.btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Toggle group */
.toggle-group { display: flex; gap: 0; }
.toggle-group .btn {
  border-radius: 0;
  border-right-width: 0;
  border-color: var(--border);
  color: var(--fg-muted);
}
.toggle-group .btn:first-child { border-radius: 980px 0 0 980px; }
.toggle-group .btn:last-child { border-radius: 0 980px 980px 0; border-right-width: 1px; }
.btn.toggle { background: transparent; color: var(--fg-muted); border-color: var(--border); }
.btn.toggle.active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}
.btn.toggle:hover:not(.active) {
  background: color-mix(in srgb, var(--accent) 10%, transparent);
  color: var(--accent);
}

/* Main panels */
main {
  flex: 1;
  display: flex;
  min-height: 0;
}
main.single-panel .panel { flex: 1; }
@media (max-width: 900px) {
  main { flex-direction: column; }
  main.single-panel { flex-direction: column; }
}

.panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 200px;
  flex: 1;
  overflow: hidden;
  background: var(--surface);
}
#panel-source { border-right: 1px solid var(--border); }
@media (max-width: 900px) {
  #panel-source { border-right: none; border-bottom: 1px solid var(--border); }
}

/* Resizer */
.resizer {
  width: 5px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
  position: relative;
}
.resizer::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 32px;
  border-radius: 2px;
  background: var(--fg-muted);
  opacity: 0;
  transition: opacity 0.2s;
}
.resizer:hover::after, .resizer.dragging::after { opacity: 1; }
.resizer.dragging { background: color-mix(in srgb, var(--accent) 15%, transparent); }
@media (max-width: 900px) {
  .resizer { width: auto; height: 5px; cursor: row-resize; }
  .resizer::after { width: 32px; height: 3px; }
}
main.single-panel .resizer { display: none; }

/* Panel labels */
.panel label[for] {
  padding: 0.5rem 1rem 0;
  font-size: 0.6875rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
  font-weight: 600;
}

/* Source editor */
#source {
  flex: 1;
  margin: 0;
  padding: 1rem;
  border: none;
  resize: none;
  font-family: "SF Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
  font-size: 0.8125rem;
  line-height: 1.5;
  background: var(--surface);
  color: var(--fg);
  outline: none;
  tab-size: 2;
}

/* Preview */
#preview-wrap {
  flex: 1;
  overflow: auto;
  padding: 1.25rem 1.5rem;
  position: relative;
  background: var(--surface);
}
#usage-watermark {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.125rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg-muted);
  pointer-events: none;
  text-align: center;
  padding: 2rem;
}
#tab-spaces-num {
  width: 2.5em;
  font: inherit;
  font-size: 0.75rem;
  padding: 2px 4px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  text-align: center;
}

/* Preview typography */
#preview {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  color: var(--fg);
  line-height: 1.47;
  letter-spacing: -0.022em;
}
#preview :first-child { margin-top: 0; }

#preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  color: var(--fg);
  scroll-margin-top: 4rem;
  letter-spacing: -0.015em;
}
#preview h1 { font-size: 2rem; font-weight: 600; line-height: 1.1; margin: 1.5em 0 0.5em; }
#preview h2 { font-size: 1.5rem; font-weight: 600; line-height: 1.12; margin: 1.4em 0 0.4em; }
#preview h3 { font-size: 1.17rem; font-weight: 600; line-height: 1.19; margin: 1.2em 0 0.35em; }
#preview h4 { font-size: 1rem; font-weight: 600; line-height: 1.25; margin: 1.1em 0 0.3em; }
#preview h5 { font-size: 0.875rem; font-weight: 600; line-height: 1.29; margin: 1em 0 0.25em; }
#preview h6 { font-size: 0.8125rem; font-weight: 600; line-height: 1.33; margin: 1em 0 0.25em; color: var(--fg-secondary); }

#preview p { margin: 0.75em 0; }
#preview a { color: var(--accent-link); text-decoration: none; }
#preview a:hover { text-decoration: underline; }
#preview blockquote {
  margin: 1em 0;
  padding: 0.5em 1em;
  border-left: 3px solid var(--accent);
  color: var(--fg-secondary);
  background: color-mix(in srgb, var(--accent) 5%, transparent);
  border-radius: 0 8px 8px 0;
}
#preview blockquote p { margin: 0.35em 0; }
#preview hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5em 0;
}

/* Code */
#preview pre {
  overflow: auto;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 0.8125rem;
}
#preview code { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }

/* Tables */
#preview table {
  border-collapse: collapse;
  margin: 1rem 0;
  width: auto;
  max-width: 100%;
  overflow: auto;
  display: block;
  font-size: 0.875rem;
}
#preview th, #preview td {
  text-align: left;
  padding: 0.5rem 0.875rem;
  border-bottom: 1px solid var(--border);
}
#preview thead th {
  border-bottom: 2px solid var(--fg);
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--fg-secondary);
}

/* Images */
#preview img { height: auto; vertical-align: middle; border-radius: 8px; }
#preview.fit-width img { max-width: 100%; }
#preview.fit-width table { max-width: 100%; }
#preview.fit-width pre { max-width: 100%; }
#preview.fit-width .plantuml-block img { max-width: 100%; }

/* Lists */
#preview ul, #preview ol { padding-left: 1.5em; margin: 0.5em 0; }
#preview li { margin: 0.25em 0; }
#preview li > ul, #preview li > ol { margin: 0.15em 0; }

/* PlantUML */
.plantuml-block {
  margin: 1rem 0;
  padding: 0.75rem;
  border: none;
  border-radius: 12px;
  background: var(--surface);
  overflow: auto;
}
.plantuml-block img { max-width: none; }
.plantuml-block figcaption { margin-top: 0.5rem; font-size: 0.6875rem; color: var(--fg-muted); }
.plantuml-block a { color: var(--accent-link); }
.plantuml-error { color: #ff3b30; font-size: 0.875rem; }

/* MyST Tab Set */
.myst-tab-set {
  margin: 1rem 0;
  border: none;
  border-radius: 12px;
  overflow: hidden;
  background: var(--surface-code);
}
.myst-tab-buttons {
  display: flex;
  flex-wrap: wrap;
  background: transparent;
  border-bottom: 1px solid var(--border);
  gap: 0;
  padding: 0 0.5rem;
}
.myst-tab-btn {
  font: inherit;
  font-size: 0.8125rem;
  font-weight: 400;
  padding: 0.6rem 1rem;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.myst-tab-btn:hover { color: var(--fg); }
.myst-tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.myst-tab-panels { background: var(--surface); }
.myst-tab-panel { display: none; padding: 1rem; }
.myst-tab-panel.active { display: block; }

/* MyST Grid */
.myst-grid { display: grid; gap: 0; margin: 1rem 0; }
.myst-grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
.myst-grid-cols-2 { grid-template-columns: repeat(12, 1fr); }
.myst-grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
.myst-grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
.myst-grid-cols-6 { grid-template-columns: repeat(6, 1fr); }
.myst-grid-cols-12 { grid-template-columns: repeat(12, 1fr); }
.myst-grid-item { padding: 0.5rem 0.75rem; min-width: 0; }
.myst-grid-item-outline { border: 1px solid var(--border); border-radius: 8px; }
.myst-grid-col-1 { grid-column: span 1; }
.myst-grid-col-2 { grid-column: span 2; }
.myst-grid-col-3 { grid-column: span 3; }
.myst-grid-col-4 { grid-column: span 4; }
.myst-grid-col-5 { grid-column: span 5; }
.myst-grid-col-6 { grid-column: span 6; }
.myst-grid-col-7 { grid-column: span 7; }
.myst-grid-col-8 { grid-column: span 8; }
.myst-grid-col-9 { grid-column: span 9; }
.myst-grid-col-10 { grid-column: span 10; }
.myst-grid-col-11 { grid-column: span 11; }
.myst-grid-col-12 { grid-column: span 12; }
.myst-grid.myst-grid-cols-2 > .myst-grid-item:not([class*="myst-grid-col-"]) { grid-column: span 6; }
@media (max-width: 600px) {
  .myst-grid { grid-template-columns: 1fr !important; }
  .myst-grid-item { grid-column: span 1 !important; }
}

  <script>
(function() {
  const PLANTUML_BASE = "https://www.plantuml.com/plantuml";
  let plantumlOutputFormat = "svg";

  function normalizePlantUmlSource(text) {
    const t = text.trim();
    if (t.includes("@startuml")) return t;
    return "@startuml\n" + t + "\n@enduml";
  }

  function plantumlDataUrl(source, format) {
    const encoded = plantumlEncoder.encode(normalizePlantUmlSource(source));
    return PLANTUML_BASE + "/" + format + "/" + encoded;
  }

  function renderPlantUmlBlock(source, format) {
    const url = plantumlDataUrl(source, format);
    const safeUrl = DOMPurify.sanitize(url, { ALLOWED_URI_REGEXP: /^https?:/i });
    return '<figure class="plantuml-block">' +
      '<img src="' + safeUrl + '" alt="PlantUML diagram" loading="lazy" />' +
      '</figure>';
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Generate slug for heading IDs (GitHub-style)
  function slugify(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/<[^>]*>/g, "")           // Remove HTML tags
      .replace(/[^\w\s\u4e00-\u9fff-]/g, "") // Keep letters, numbers, spaces, Chinese, hyphens
      .replace(/\s+/g, "-")              // Spaces to hyphens
      .replace(/-+/g, "-")               // Collapse multiple hyphens
      .replace(/^-|-$/g, "");            // Trim hyphens
  }

  var headingCount = {};

  /**
   * MyST (Markedly Structured Text) preprocessor
   * Converts MyST directives to HTML before Markdown parsing
   */
  function preprocessMyST(markdown) {
    var tabSetId = 0;

    function parseDirectiveOptions(content) {
      var lines = content.split("\n");
      var options = {};
      var bodyStart = 0;

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var optMatch = line.match(/^:(\w[\w-]*):\s*(.*)$/);
        if (optMatch) {
          options[optMatch[1]] = optMatch[2].trim();
          bodyStart = i + 1;
        } else if (line.trim() === "") {
          bodyStart = i + 1;
        } else {
          break;
        }
      }

      return { options: options, body: lines.slice(bodyStart).join("\n") };
    }

    function repeatChar(char, count) {
      var s = "";
      for (var i = 0; i < count; i++) s += char;
      return s;
    }

    function findClosingFence(text, startIndex, backtickCount) {
      var fence = repeatChar("`", backtickCount);
      var idx = startIndex;
      while (idx < text.length) {
        var lineEnd = text.indexOf("\n", idx);
        var line = lineEnd === -1 ? text.slice(idx) : text.slice(idx, lineEnd);
        if (line.trim() === fence) {
          return idx;
        }
        idx = lineEnd === -1 ? text.length : lineEnd + 1;
      }
      return -1;
    }

    function processGridItems(content, backtickCount) {
      var fence = repeatChar("`", backtickCount);
      var itemStart = fence + "{grid-item}";
      var items = [];

      var idx = 0;
      while (idx < content.length) {
        var start = content.indexOf(itemStart, idx);
        if (start === -1) break;

        var afterStart = start + itemStart.length;
        var contentStart = content.indexOf("\n", afterStart);
        if (contentStart === -1) break;

        var closeIdx = findClosingFence(content, contentStart + 1, backtickCount);
        if (closeIdx === -1) break;

        var itemContent = content.slice(contentStart + 1, closeIdx);
        items.push(parseDirectiveOptions(itemContent));

        idx = closeIdx + fence.length;
        var nextNewline = content.indexOf("\n", idx);
        idx = nextNewline === -1 ? content.length : nextNewline + 1;
      }

      var html = "";
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var columns = item.options["columns"] || "auto";
        var outline = "outline" in item.options;
        var colClass = columns !== "auto" ? " myst-grid-col-" + columns : "";
        var outlineClass = outline ? " myst-grid-item-outline" : "";
        html += '<div class="myst-grid-item' + colClass + outlineClass + '">\n\n' + item.body.trim() + '\n\n</div>\n';
      }

      return html;
    }

    function processGrid(content, columns, backtickCount) {
      var innerBackticks = backtickCount - 1;
      var processedItems = processGridItems(content, innerBackticks);
      var colCount = parseInt(columns) || 2;
      return '<div class="myst-grid myst-grid-cols-' + colCount + '">\n\n' + processedItems + '\n\n</div>\n';
    }

    function processNestedGrids(content) {
      var result = content;
      var gridPattern = /^(`{4,})\{grid\}\s*(\d*)\s*$/m;

      var match;
      while ((match = gridPattern.exec(result)) !== null) {
        var fence = match[1];
        var cols = match[2] || "2";
        var startIdx = match.index;
        var contentStart = result.indexOf("\n", startIdx) + 1;
        var closeIdx = findClosingFence(result, contentStart, fence.length);

        if (closeIdx === -1) break;

        var gridContent = result.slice(contentStart, closeIdx);
        var closeEnd = result.indexOf("\n", closeIdx);
        var endIdx = closeEnd === -1 ? result.length : closeEnd + 1;

        var processed = processGrid(gridContent, cols, fence.length);
        result = result.slice(0, startIdx) + processed + result.slice(endIdx);
      }

      return result;
    }

    function processTabItems(content, backtickCount, setId) {
      var fence = repeatChar("`", backtickCount);
      var itemStart = fence + "{tab-item}";
      var tabs = [];

      var idx = 0;
      while (idx < content.length) {
        var start = content.indexOf(itemStart, idx);
        if (start === -1) break;

        var afterStart = start + itemStart.length;
        var lineEnd = content.indexOf("\n", afterStart);
        if (lineEnd === -1) break;

        var label = content.slice(afterStart, lineEnd).trim() || "Tab " + (tabs.length + 1);
        var contentStart = lineEnd + 1;
        var closeIdx = findClosingFence(content, contentStart, backtickCount);
        if (closeIdx === -1) break;

        var tabContent = content.slice(contentStart, closeIdx);
        tabContent = processNestedGrids(tabContent);

        tabs.push({
          label: label,
          content: tabContent.trim(),
          id: "tab-" + setId + "-" + tabs.length
        });

        idx = closeIdx + fence.length;
        var nextNewline = content.indexOf("\n", idx);
        idx = nextNewline === -1 ? content.length : nextNewline + 1;
      }

      if (tabs.length === 0) return content;

      var html = '<div class="myst-tab-set" data-tabset="' + setId + '">\n';
      html += '<div class="myst-tab-buttons" role="tablist">\n';

      tabs.forEach(function(tab, i) {
        var active = i === 0 ? " active" : "";
        var selected = i === 0 ? "true" : "false";
        html += '<button class="myst-tab-btn' + active + '" role="tab" aria-selected="' + selected + '" data-tab="' + tab.id + '">' + escapeHtml(tab.label) + '</button>\n';
      });

      html += '</div>\n<div class="myst-tab-panels">\n';

      tabs.forEach(function(tab, i) {
        var active = i === 0 ? " active" : "";
        html += '<div class="myst-tab-panel' + active + '" role="tabpanel" data-tab="' + tab.id + '">\n\n' + tab.content + '\n\n</div>\n';
      });

      html += '</div>\n</div>\n';
      return html;
    }

    function processTabSets(text) {
      var result = text;
      var tabSetPattern = /^(`{6,})\{tab-set\}\s*$/m;

      var match;
      while ((match = tabSetPattern.exec(result)) !== null) {
        var fence = match[1];
        var startIdx = match.index;
        var contentStart = result.indexOf("\n", startIdx) + 1;
        var closeIdx = findClosingFence(result, contentStart, fence.length);

        if (closeIdx === -1) break;

        var tabSetContent = result.slice(contentStart, closeIdx);
        var closeEnd = result.indexOf("\n", closeIdx);
        var endIdx = closeEnd === -1 ? result.length : closeEnd + 1;

        tabSetId++;
        var innerBackticks = fence.length - 1;
        var processed = processTabItems(tabSetContent, innerBackticks, tabSetId);

        result = result.slice(0, startIdx) + processed + result.slice(endIdx);
      }

      return result;
    }

    function wrapBarePlantUml(text) {
      var fenced = [];
      var placeholder = text.replace(/^(`{3,})[^\n]*\n[\s\S]*?^\1\s*$/gm, function(m) {
        fenced.push(m);
        return "\x00FENCED" + (fenced.length - 1) + "\x00";
      });
      var wrapped = placeholder.replace(
        /^([ \t]*)@start(uml|ditaa|mindmap|wbs|gantt|salt|json|yaml|ebnf|regex|chronology|board)\b[^\n]*\n[\s\S]*?@end\2\b/gm,
        function(match, indent) {
          return indent + "```plantuml\n" + match.trim() + "\n" + indent + "```";
        }
      );
      return wrapped.replace(/\x00FENCED(\d+)\x00/g, function(_, i) { return fenced[i]; });
    }

    var result = markdown;
    result = wrapBarePlantUml(result);
    result = processTabSets(result);
    result = processNestedGrids(result);

    return result;
  }

  marked.use({
    renderer: {
      heading: function(token) {
        var text = this.parser.parseInline(token.tokens);
        var rawText = token.text;
        var slug = slugify(rawText);
        
        // Handle duplicate headings by appending number
        if (headingCount[slug] !== undefined) {
          headingCount[slug]++;
          slug = slug + "-" + headingCount[slug];
        } else {
          headingCount[slug] = 0;
        }
        
        return '<h' + token.depth + ' id="' + slug + '">' + text + '</h' + token.depth + '>\n';
      },
      code: function(token) {
        const lang = (token.lang || "").toLowerCase().split(/\s+/)[0];
        if (lang === "plantuml" || lang === "puml" || lang === "{uml}") {
          try {
            return renderPlantUmlBlock(token.text, plantumlOutputFormat);
          } catch (e) {
            return '<p class="plantuml-error">PlantUML encode error: ' + escapeHtml(e.message) + '</p>';
          }
        }
        const langClass = lang ? ' class="language-' + lang + '"' : "";
        const escaped = escapeHtml(token.text);
        return '<pre><code' + langClass + '>' + escaped + '</code></pre>';
      }
    }
  });

  marked.setOptions({ gfm: true, breaks: false });

  const DEFAULT_MD = '# Markdown Viewer\n\n' +
    'Use a fenced block with language `plantuml` or `puml`:\n\n' +
    '```plantuml\n@startuml\nAlice -> Bob: hello\nBob --> Alice: hi\n@enduml\n```\n\n' +
    'Regular **markdown** and `inline code` work as usual.\n';

  function mount() {
    const app = document.getElementById("app");

    app.innerHTML = 
      '<header>' +
        '<h1>Markdown Viewer</h1>' +
        '<p class="hint" id="filename-display"></p>' +
        '<div class="controls">' +
          '<input type="file" id="file-open" accept=".md,.markdown,.mdown,.mkd,text/markdown,text/plain" hidden />' +
          '<button type="button" id="btn-open-file" class="btn">Open</button>' +
          '<button type="button" id="btn-reopen-file" class="btn" disabled>Reopen</button>' +
          '<button type="button" id="btn-save-file" class="btn">Save</button>' +
          '<div class="toggle-group">' +
            '<button type="button" id="btn-toggle-source" class="btn toggle active" aria-pressed="true">Source</button>' +
            '<button type="button" id="btn-toggle-preview" class="btn toggle active" aria-pressed="true">Preview</button>' +
          '</div>' +
          '<label>' +
            '<input type="checkbox" id="fit-width" checked /> FitWidth' +
          '</label>' +
          '<label>' +
            '<input type="checkbox" id="tab2spaces" checked /> Tab2Spaces' +
          '</label>' +
          '<input type="number" id="tab-spaces-num" value="2" min="1" max="16" aria-label="Tab width" />' +
          '<label>' +
            '<span>Format</span>' +
            '<select id="uml-format" aria-label="PlantUML output format">' +
              '<option value="svg" selected>SVG</option>' +
              '<option value="png">PNG</option>' +
            '</select>' +
          '</label>' +
        '</div>' +
      '</header>' +
      '<main>' +
        '<section class="panel" id="panel-source">' +
          '<label for="source">Markdown source</label>' +
          '<textarea id="source" spellcheck="false" aria-label="Markdown source"></textarea>' +
        '</section>' +
        '<div class="resizer" id="resizer"></div>' +
        '<section class="panel" id="panel-preview">' +
          '<label for="preview-wrap">Preview</label>' +
          '<div id="preview-wrap" tabindex="-1">' +
            '<div id="usage-watermark">Drag and Drop a .md file onto the page, or use Open file</div>' +
            '<article id="preview"></article>' +
          '</div>' +
        '</section>' +
      '</main>';

    const source = document.getElementById("source");
    const preview = document.getElementById("preview");
    const formatSelect = document.getElementById("uml-format");
    const fileOpenInput = document.getElementById("file-open");
    const btnOpenFile = document.getElementById("btn-open-file");
    const btnReopenFile = document.getElementById("btn-reopen-file");
    const btnSaveFile = document.getElementById("btn-save-file");
    const btnToggleSource = document.getElementById("btn-toggle-source");
    const btnTogglePreview = document.getElementById("btn-toggle-preview");
    const filenameDisplay = document.getElementById("filename-display");
    const usageWatermark = document.getElementById("usage-watermark");
    const fitWidthCheckbox = document.getElementById("fit-width");
    const tab2spacesCheckbox = document.getElementById("tab2spaces");
    const tabSpacesNum = document.getElementById("tab-spaces-num");
    const panelSource = document.getElementById("panel-source");
    const panelPreview = document.getElementById("panel-preview");
    const resizer = document.getElementById("resizer");
    const main = document.querySelector("main");

    var currentFileName = "document.md";
    var fileOpened = false;

    function updateFilenameDisplay() {
      filenameDisplay.textContent = fileOpened ? currentFileName : "";
    }

    function hideWatermark() {
      if (!fileOpened) {
        fileOpened = true;
        usageWatermark.style.display = "none";
        updateFilenameDisplay();
      }
    }

    source.value = DEFAULT_MD;
    updateFilenameDisplay();
    preview.classList.add("fit-width");

    fitWidthCheckbox.addEventListener("change", function() {
      preview.classList.toggle("fit-width", fitWidthCheckbox.checked);
    });

    source.addEventListener("keydown", function(e) {
      if (e.key === "Tab") {
        e.preventDefault();
        var start = source.selectionStart;
        var end = source.selectionEnd;
        var insert = tab2spacesCheckbox.checked
          ? " ".repeat(parseInt(tabSpacesNum.value) || 4)
          : "\t";

        if (start === end) {
          source.value = source.value.substring(0, start) + insert + source.value.substring(end);
          source.selectionStart = source.selectionEnd = start + insert.length;
        } else {
          var val = source.value;
          var before = val.substring(0, start);
          var selected = val.substring(start, end);
          var after = val.substring(end);

          if (e.shiftKey) {
            var lines = selected.split("\n");
            var pattern = tab2spacesCheckbox.checked
              ? new RegExp("^ {1," + (parseInt(tabSpacesNum.value) || 4) + "}")
              : /^\t/;
            var dedented = lines.map(function(line) { return line.replace(pattern, ""); });
            var newSelected = dedented.join("\n");
            source.value = before + newSelected + after;
            source.selectionStart = start;
            source.selectionEnd = start + newSelected.length;
          } else {
            var indented = selected.split("\n").map(function(line) { return insert + line; }).join("\n");
            source.value = before + indented + after;
            source.selectionStart = start;
            source.selectionEnd = start + indented.length;
          }
        }
        scheduleRender();
      }
    });

    function updateLayout() {
      const showSource = btnToggleSource.classList.contains("active");
      const showPreview = btnTogglePreview.classList.contains("active");
      panelSource.style.display = showSource ? "" : "none";
      panelPreview.style.display = showPreview ? "" : "none";
      resizer.style.display = (showSource && showPreview) ? "" : "none";
      if (showSource && showPreview) {
        main.classList.remove("single-panel");
      } else {
        main.classList.add("single-panel");
      }
    }

    // Resizer drag logic
    var isResizing = false;
    resizer.addEventListener("mousedown", function(e) {
      isResizing = true;
      resizer.classList.add("dragging");
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
      e.preventDefault();
    });

    document.addEventListener("mousemove", function(e) {
      if (!isResizing) return;
      var mainRect = main.getBoundingClientRect();
      var isVertical = window.innerWidth <= 900;
      
      if (isVertical) {
        var offsetY = e.clientY - mainRect.top;
        var percent = (offsetY / mainRect.height) * 100;
        percent = Math.max(15, Math.min(85, percent));
        panelSource.style.flex = "0 0 " + percent + "%";
        panelPreview.style.flex = "1";
      } else {
        var offsetX = e.clientX - mainRect.left;
        var percent = (offsetX / mainRect.width) * 100;
        percent = Math.max(15, Math.min(85, percent));
        panelSource.style.flex = "0 0 " + percent + "%";
        panelPreview.style.flex = "1";
      }
    });

    document.addEventListener("mouseup", function() {
      if (isResizing) {
        isResizing = false;
        resizer.classList.remove("dragging");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      }
    });

    btnToggleSource.addEventListener("click", function() {
      btnToggleSource.classList.toggle("active");
      btnToggleSource.setAttribute("aria-pressed", btnToggleSource.classList.contains("active"));
      updateLayout();
    });

    btnTogglePreview.addEventListener("click", function() {
      btnTogglePreview.classList.toggle("active");
      btnTogglePreview.setAttribute("aria-pressed", btnTogglePreview.classList.contains("active"));
      updateLayout();
    });

    function render() {
      // Reset heading counter for duplicate ID handling
      headingCount = {};
      
      var preprocessed = preprocessMyST(source.value);
      const raw = marked.parse(preprocessed);
      preview.innerHTML = DOMPurify.sanitize(raw, {
        ADD_TAGS: ["img", "button", "div", "article", "section", "figure", "figcaption"],
        ADD_ATTR: ["loading", "target", "rel", "id", "role", "aria-selected", "data-tab", "data-tabset", "class"]
      });

      // Apply Prism syntax highlighting
      if (typeof Prism !== "undefined") {
        preview.querySelectorAll("pre code").forEach(function(block) {
          Prism.highlightElement(block);
        });
      }

      // Make external links open in new tab, handle relative links
      preview.querySelectorAll("a[href]").forEach(function(link) {
        var href = link.getAttribute("href");
        if (href && (href.startsWith("http://") || href.startsWith("https://"))) {
          link.setAttribute("target", "_blank");
          link.setAttribute("rel", "noopener noreferrer");
        } else if (href && !href.startsWith("#")) {
          // Handle relative links (e.g., ./other.md, ../file.md)
          link.addEventListener("click", function(e) {
            e.preventDefault();
            loadRelativeFile(href);
          });
        }
      });

      // Tab switching logic
      preview.querySelectorAll(".myst-tab-set").forEach(function(tabSet) {
        var buttons = tabSet.querySelectorAll(".myst-tab-btn");
        var panels = tabSet.querySelectorAll(".myst-tab-panel");

        buttons.forEach(function(btn) {
          btn.addEventListener("click", function() {
            var tabId = btn.getAttribute("data-tab");

            buttons.forEach(function(b) {
              b.classList.remove("active");
              b.setAttribute("aria-selected", "false");
            });
            panels.forEach(function(p) { p.classList.remove("active"); });

            btn.classList.add("active");
            btn.setAttribute("aria-selected", "true");
            var panel = tabSet.querySelector('.myst-tab-panel[data-tab="' + tabId + '"]');
            if (panel) panel.classList.add("active");
          });
        });
      });
    }

    var timer;
    function scheduleRender() {
      clearTimeout(timer);
      timer = setTimeout(render, 120);
    }

    source.addEventListener("input", scheduleRender);
    source.addEventListener("change", scheduleRender);

    // Handle browser back/forward navigation (bfcache restore)
    window.addEventListener("pageshow", function(event) {
      // Always re-render when page becomes visible, handles bfcache
      setTimeout(function() {
        render();
      }, 10);
    });

    formatSelect.addEventListener("change", function() {
      plantumlOutputFormat = formatSelect.value === "png" ? "png" : "svg";
      scheduleRender();
    });

    function hasFilePayload(dt) {
      if (!dt || !dt.types || !dt.types.length) return false;
      for (var i = 0; i < dt.types.length; i++) {
        if (dt.types[i] === "Files") return true;
      }
      return false;
    }

    function pickMarkdownFile(files) {
      if (!files || !files.length) return null;
      var list = Array.from(files);
      var byName = list.find(function(f) { return /\.(md|markdown|mdown|mkd)$/i.test(f.name); });
      if (byName) return byName;
      var byType = list.find(function(f) { return f.type.indexOf("text/") === 0; });
      if (byType) return byType;
      return list[0];
    }

    var fileHandle = null; // File System Access API handle
    var lastSavedContent = DEFAULT_MD;
    var currentDirectoryPath = ""; // Store current directory path for relative links

    function updateReopenButton() {
      btnReopenFile.disabled = !fileHandle;
    }

    function isContentModified() {
      return source.value !== lastSavedContent;
    }

    function loadFile(file) {
      currentFileName = file.webkitRelativePath || file.name || "document.md";
      file.text().then(function(text) {
        source.value = text;
        lastSavedContent = text;
        hideWatermark();
        updateFilenameDisplay();
        scheduleRender();
      });
    }

    // Load relative file by triggering file picker
    function loadRelativeFile(relativePath) {
      // Extract just the filename from the path (remove ./ and ../)
      var fileName = relativePath.replace(/^(\.\/|\.\.\/)+/, "");
      
      // Store the expected filename for reference
      window.pendingRelativeFile = fileName;
      
      // Directly trigger the file picker
      // Browser will remember last directory, making it easy to select the file
      if (window.showOpenFilePicker) {
        openFileWithPicker();
      } else {
        fileOpenInput.click();
      }
    }

    // Use File System Access API if available (Chrome/Edge)
    async function openFileWithPicker(suggestedName) {
      if (window.showOpenFilePicker) {
        try {
          var options = {
            types: [{
              description: "Markdown files",
              accept: { "text/markdown": [".md", ".markdown", ".mdown", ".mkd"] }
            }],
            multiple: false
          };
          // Use current file handle as startIn to open in same directory
          if (fileHandle) {
            options.startIn = fileHandle;
          }
          var handles = await window.showOpenFilePicker(options);
          fileHandle = handles[0];
          var file = await fileHandle.getFile();
          currentFileName = file.name;
          var text = await fileHandle.getFile().then(f => f.text());
          source.value = text;
          lastSavedContent = text;
          hideWatermark();
          updateFilenameDisplay();
          scheduleRender();
          updateReopenButton();
        } catch (e) {
          if (e.name !== "AbortError") console.error(e);
        }
      } else {
        // For browsers without File System Access API, use traditional file input
        // Note: We cannot set default filename, but user can navigate to the file
        fileOpenInput.click();
      }
    }

    async function reopenFile() {
      if (!fileHandle) return;

      if (isContentModified()) {
        var confirmed = confirm("You have unsaved changes. Reopen will discard them. Continue?");
        if (!confirmed) return;
      }

      try {
        var file = await fileHandle.getFile();
        currentFileName = file.name;
        var text = await file.text();
        source.value = text;
        lastSavedContent = text;
        hideWatermark();
        updateFilenameDisplay();
        scheduleRender();
      } catch (e) {
        console.error("Could not reopen file:", e);
        fileHandle = null;
        updateReopenButton();
      }
    }

    async function saveFile() {
      var content = source.value;

      // Try to save directly to original file (File System Access API)
      if (fileHandle) {
        var confirmed = confirm('Save changes to "' + currentFileName + '"?');
        if (!confirmed) return;

        try {
          var writable = await fileHandle.createWritable();
          await writable.write(content);
          await writable.close();
          lastSavedContent = content;
          return; // Saved successfully
        } catch (e) {
          console.warn("Could not save to original file:", e);
        }
      }

      // Try "Save As" with File System Access API
      if (window.showSaveFilePicker) {
        try {
          var newHandle = await window.showSaveFilePicker({
            suggestedName: currentFileName,
            types: [{
              description: "Markdown files",
              accept: { "text/markdown": [".md"] }
            }]
          });
          fileHandle = newHandle;
          currentFileName = newHandle.name;
          updateFilenameDisplay();
          var writable = await newHandle.createWritable();
          await writable.write(content);
          await writable.close();
          lastSavedContent = content;
          updateReopenButton();
          return;
        } catch (e) {
          if (e.name !== "AbortError") console.error(e);
          return;
        }
      }

      // Fallback: download file
      var blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = currentFileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      lastSavedContent = content;
    }

    btnOpenFile.addEventListener("click", function() {
      openFileWithPicker();
    });
    btnReopenFile.addEventListener("click", reopenFile);
    btnSaveFile.addEventListener("click", saveFile);
    fileOpenInput.addEventListener("change", function() {
      var file = fileOpenInput.files && fileOpenInput.files[0];
      var inputPath = fileOpenInput.value;
      fileOpenInput.value = "";
      if (file) {
        fileHandle = null;
        if (inputPath && !inputPath.includes("fakepath")) {
          currentFileName = inputPath;
        }
        
        // Validate if selected file matches the expected relative file
        if (window.pendingRelativeFile) {
          var expectedName = window.pendingRelativeFile;
          var actualName = file.name;
          if (expectedName !== actualName) {
            var confirmLoad = confirm("Expected file: " + expectedName + "\n" +
                                      "Selected file: " + actualName + "\n\n" +
                                      "Do you want to load this file anyway?");
            if (!confirmLoad) {
              window.pendingRelativeFile = null;
              return;
            }
          }
          window.pendingRelativeFile = null;
        }
        
        updateReopenButton();
        loadFile(file);
      }
    });

    var fileDragDepth = 0;
    document.addEventListener("dragenter", function(e) {
      if (!hasFilePayload(e.dataTransfer)) return;
      e.preventDefault();
      fileDragDepth++;
      app.classList.add("drag-active");
    }, true);

    document.addEventListener("dragleave", function(e) {
      if (!hasFilePayload(e.dataTransfer)) return;
      e.preventDefault();
      fileDragDepth--;
      if (fileDragDepth <= 0) {
        fileDragDepth = 0;
        app.classList.remove("drag-active");
      }
    }, true);

    document.addEventListener("dragover", function(e) {
      if (!hasFilePayload(e.dataTransfer)) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    }, true);

    document.addEventListener("drop", async function(e) {
      if (!hasFilePayload(e.dataTransfer)) return;
      e.preventDefault();
      fileDragDepth = 0;
      app.classList.remove("drag-active");
      
      // Try to get file handle for reopen support (Chrome/Edge)
      if (e.dataTransfer.items && e.dataTransfer.items[0] && e.dataTransfer.items[0].getAsFileSystemHandle) {
        try {
          var handle = await e.dataTransfer.items[0].getAsFileSystemHandle();
          if (handle && handle.kind === "file") {
            fileHandle = handle;
            var file = await fileHandle.getFile();
            currentFileName = file.name;
            var text = await file.text();
            source.value = text;
            lastSavedContent = text;
            hideWatermark();
            updateFilenameDisplay();
            scheduleRender();
            updateReopenButton();
            return;
          }
        } catch (err) {
          console.warn("Could not get file handle:", err);
        }
      }
      
      // Fallback: use regular file (no reopen support)
      var file = pickMarkdownFile(e.dataTransfer.files);
      if (file) {
        fileHandle = null; // No handle available
        updateReopenButton();
        loadFile(file);
      }
    }, true);

    window.addEventListener("dragend", function() {
      fileDragDepth = 0;
      app.classList.remove("drag-active");
    });

    render();
  }

  mount();
})();
  </script>
</body>
</html>
